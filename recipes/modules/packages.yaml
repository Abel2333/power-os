---

modules:
  - type: dnf
    repos:
      copr:
        - atim/starship
        - yalter/niri
        - alternateved/keyd
        - atim/nushell
        - zhullyb/v2rayA
    install:
      packages:
        # Develop
        - gcc
        - gcc-c++
        - make
        - uv

        # Shell prompt
        - starship

        # Wayland compositor and desktop shell
        - niri
        - mako
        - waybar

        # Terminal emulator
        - kitty

        # Session, lock, and wallpaper
        - swaylock
        - swayidle
        - swaybg
        - swaymsg

        # X11 compatibility
        - xwayland-satellite

        # XDG desktop portals
        - xdg-desktop-portal-kde
        - xdg-desktop-portal-gtk

        # Clipboard and audio control
        - wl-clipboard
        - pavucontrol

        # Shell
        - zsh
        - nushell

        # Input method
        - fcitx5
        - fcitx5-rime
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-configtool

        # Privilege escalation and input remapping
        - polkit-kde
        - keyd

        # CLI tools
        - eza
        - fd-find
        - ripgrep
        - tmux
        - zoxide

        - rclone

        # Proxy
        - dae
    remove:
      packages:
        # Browser
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - alacritty

  - type: script
    snippets:
      # carapace-bin
      - "curl -fsSL https://github.com/carapace-sh/carapace-bin/releases/download/v1.6.5/carapace-bin_1.6.5_linux_amd64.tar.gz -o /tmp/carapace.tar.gz"
      - "tar xzf /tmp/carapace.tar.gz -C /usr/bin carapace"
      - "chmod +x /usr/bin/carapace"

      # codex
      - "curl -fsSL https://github.com/openai/codex/releases/download/rust-v0.129.0/codex-x86_64-unknown-linux-musl.tar.gz -o /tmp/codex.tar.gz"
      - "tar xzf /tmp/codex.tar.gz -C /tmp"
      - "install -Dm755 /tmp/codex-x86_64-unknown-linux-musl /usr/bin/codex"
      - "rm /tmp/codex.tar.gz /tmp/codex-x86_64-unknown-linux-musl"


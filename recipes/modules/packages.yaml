---

modules:
  - type: script
    snippets:
      - "curl -fsSL https://download.docker.com/linux/fedora/docker-ce.repo -o /etc/yum.repos.d/docker-ce.repo"

  - type: dnf
    repos:
      copr:
        - yalter/niri
        - alternateved/keyd
        - atim/nushell
        - zhullyb/v2rayA
    install:
      packages:
        # Development
        - gcc
        - gcc-c++
        - make
        - cmake
        - clang
        - clangd
        - ninja
        - perl
        - uv
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin

        # Shell prompt

        # Wayland compositor and desktop shell
        - niri
        - mako
        - waybar

        # Terminal emulator
        - kitty

        # Session, lock, and wallpaper
        - swaylock
        - swayidle
        - swaybg
        - swaymsg
        - brightnessctl
        - upower

        # X11 compatibility
        - xwayland-satellite

        # XDG desktop portals
        - xdg-desktop-portal-kde
        - xdg-desktop-portal-gtk

        # Clipboard and audio control
        - wl-clipboard
        - pavucontrol

        # Shell
        - zsh
        - nushell

        # Input method
        - fcitx5
        - fcitx5-rime
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-configtool

        # Privilege escalation and input remapping
        - polkit-kde
        - keyd

        # AppImage compatibility
        - fuse
        - fuse-libs

        # Nix package manager
        - nix
        - nix-daemon
        - nix-filesystem
        - nix-system
        - nix-legacy

        # CLI tools
        - rclone
        - mpd

        # Proxy
        - dae
    remove:
      packages:
        # Browser
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - alacritty

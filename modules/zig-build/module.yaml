name: zig-build
shortdesc: Build a Zig binary from source in a build stage and export /out artifacts.
example: |
  type: zig-build
  source: local
  repository: https://github.com/oven-sh/bun.git
  branch: main
  enable_updates_testing: true
  zig_bin: bun
  # Optional: pin the Zig compiler version via anyzig.
  zig_version: 0.15.2
  output_bin: /out/bun
  # Optional: apply local patch files after clone and before build.
  # Patch files are typically provided from this repo's files/ tree and mounted at /tmp/files/...
  # patches:
  #   - /tmp/files/patches/example.patch
  # Optional: fully override the compile command.
  # Prefer list form for predictable argument handling:
  # build_cmd:
  #   - zig
  #   - build
  #   - -Doptimize=ReleaseFast

name: make-build
shortdesc: Build a project with make in a build stage and export explicit /out artifacts.
example: |
  type: make-build
  source: local
  repository: https://github.com/example/project.git
  branch: main
  dnf_deps:
    - perl
  build_cmd:
    - make
    - release
  artifacts:
    - source: build/project
      dest: /out/project
      mode: "755"
    - source: completions
      dest: /out/project-completions
